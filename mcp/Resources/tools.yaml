tools:
  # ────────────────────────────────────────────────────────────────
  # TOOL 3: Search Archives — GET /api/public/archive (live, có filter
  # chính xác theo field thật, KHÁC search_profile là semantic search)
  # ────────────────────────────────────────────────────────────────
  - category: mcp
    name_tool: search_archives
    description: >
      Tìm kiếm hồ sơ lưu trữ theo từ khóa/bộ lọc CHÍNH XÁC (status, kho,
      ngôn ngữ, mã thời hạn bảo quản, khoảng ngày tạo/sửa). Đây là tool
      DUY NHẤT để tìm hồ sơ — tool tự thử khớp chính xác trước, chỉ khi
      không có kết quả nào mới tự mở rộng sang tìm kiếm theo nghĩa
      (semantic) trên dữ liệu đã đánh index. Không cần gọi tool nào
      khác để "tìm theo nghĩa" — cứ gọi tool này. Response có field
      "search_mode": "keyword" hoặc "semantic_fallback" để biết kết quả
      đến từ nguồn nào.
    inputSchema:
      type: object
      properties:
        keyword:
          type: string
          description: "Từ khóa tìm trong tiêu đề, mã hồ sơ (arcFileCode), hoặc mã hộp (boxCode)."
        status:
          type: string
          description: "Lọc theo trạng thái hồ sơ."
        warehouse_id:
          type: string
          description: "Lọc theo ID kho lưu trữ."
        language:
          type: string
          description: "Lọc theo ngôn ngữ hồ sơ (VD: vi, en)."
        maintenance:
          type: string
          description: "Mã thời hạn bảo quản (VD: '10 năm', '5 năm', 'Vĩnh viễn')."
        created_from:
          type: string
          description: "Lọc hồ sơ được tạo TỪ ngày này (ISO date, VD 2024-01-01)."
        created_to:
          type: string
          description: "Lọc hồ sơ được tạo ĐẾN ngày này (ISO date)."
        updated_from:
          type: string
          description: "Lọc hồ sơ được cập nhật TỪ ngày này (ISO date)."
        updated_to:
          type: string
          description: "Lọc hồ sơ được cập nhật ĐẾN ngày này (ISO date)."
        page:
          type: integer
          description: "Số trang, bắt đầu từ 0. Mặc định 0. Chỉ tăng lên khi trang trước không có kết quả phù hợp và vẫn còn trang tiếp theo."
        size:
          type: integer
          description: "Số hồ sơ mỗi trang. Mặc định 20."
      required: []
