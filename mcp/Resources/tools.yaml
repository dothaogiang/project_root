  # ────────────────────────────────────────────────────────────────
  # TOOL 6: File Proxy — GET /api/public/files/proxy (xem/tải file gốc)
  # ────────────────────────────────────────────────────────────────
  - category: mcp
    name_tool: get_file_proxy
    description: >
      Lấy nội dung file gốc (PDF, ảnh...). Tham số `key` PHẢI lấy từ
      field "fileKeys" trong kết quả search_archives (KHÔNG phải
      archive_id, KHÔNG phải arcFileCode). Nếu hồ sơ có
      "hasFiles": false (hoặc "projects": [] rỗng) thì hồ sơ đó
      KHÔNG có file nào để lấy, đừng gọi tool này.
    inputSchema:
      type: object
      properties:
        key:
          type: string
          description: "Storage key của file, lấy từ get_archive_detail."
        file_name:
          type: string
          description: "Tên file gốc, lấy từ get_archive_detail."
      required:
        - key
#        - file_name
