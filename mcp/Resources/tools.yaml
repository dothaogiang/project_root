tools:
  # ────────────────────────────────────────────────────────────────
  # TOOL 1: Get Profile Detail — trả lời câu hỏi TRONG PHẠM VI 1 hồ sơ
  # ĐÃ BIẾT archive_id (lấy từ kết quả search_archives). Semantic search
  # trên nội dung file MD đã chunk + embed sẵn.
  # ────────────────────────────────────────────────────────────────
  - category: mcp
    name_tool: get_profile_detail
    description: >
      Trả lời câu hỏi chi tiết TRONG PHẠM VI 1 hồ sơ CỤ THỂ đã biết
      archive_id (lấy từ search_archives trước đó). Semantic search
      trên nội dung file MD của hồ sơ đó (đã chunk + embed sẵn trong
      Qdrant), trả về các đoạn text liên quan nhất kèm nguồn (file_url,
      page_number). Nếu CHƯA có archive_id (chỉ có tên người/từ khóa),
      dùng find_profile_and_answer thay vì tool này.
    inputSchema:
      type: object
      properties:
        archive_id:
          type: string
          description: "ID hồ sơ cần hỏi, lấy từ kết quả search_archives."
        question:
          type: string
          description: "Câu hỏi cụ thể về nội dung hồ sơ, VD 'quyết định tăng lương vào ngày nào'."
        top_k:
          type: integer
          description: "Số đoạn text tối đa trả về. Mặc định và tối đa là 5."
      required: ["archive_id", "question"]

  # ────────────────────────────────────────────────────────────────
  # TOOL: Find Profile And Answer — tự tìm hồ sơ khớp nhất với `key`
  # (VD tên người) bằng semantic search, rồi trả lời `question` trong
  # CHÍNH hồ sơ đó, dùng khi CHƯA biết archive_id. Gộp bước "tìm hồ sơ"
  # + "trả lời trong hồ sơ" thành 1 lần gọi.
  # ────────────────────────────────────────────────────────────────
  - category: mcp
    name_tool: find_profile_and_answer
    description: >
      Dùng khi câu hỏi gắn với 1 hồ sơ/1 người CỤ THỂ nhưng CHƯA biết
      archive_id — VD: "Lê Minh Tuấn được quyết định tăng lương vào
      ngày nào?" -> key="Lê Minh Tuấn", question="quyết định tăng
      lương vào ngày nào". Tool tự tìm hồ sơ khớp nhất với `key` bằng
      semantic search, rồi tìm đoạn text trả lời `question` TRONG chính
      hồ sơ đó (nội dung file MD đã ingest) — không cần tự gọi
      get_profile_detail riêng lẻ. Nếu câu hỏi có thể khớp với NHIỀU hồ
      sơ khác nhau (không rõ 1 hồ sơ cụ thể), dùng search_content thay
      vì tool này.
    inputSchema:
      type: object
      properties:
        key:
          type: string
          description: "Từ khóa xác định hồ sơ cần tìm, thường là tên người hoặc mã hồ sơ."
        question:
          type: string
          description: "Câu hỏi cụ thể cần trả lời trong nội dung hồ sơ đó."
        top_k:
          type: integer
          description: "Số đoạn text tối đa trả về. Mặc định và tối đa là 5."
      required: ["key", "question"]

  # ────────────────────────────────────────────────────────────────
  # TOOL: Search Content — tìm nội dung xuyên suốt TẤT CẢ hồ sơ đã
  # ingest, KHÔNG giới hạn 1 hồ sơ cụ thể. Dùng cho câu hỏi liệt kê/
  # khám phá khi chưa biết trước hồ sơ nào liên quan.
  # ────────────────────────────────────────────────────────────────
  - category: mcp
    name_tool: search_content
    description: >
      Tìm đoạn nội dung liên quan đến câu hỏi TRÊN TOÀN BỘ hồ sơ đã
      ingest, KHÔNG giới hạn 1 hồ sơ cụ thể — dùng khi câu hỏi có thể
      khớp với NHIỀU hồ sơ khác nhau, VD: "tìm những hồ sơ là nông
      dân", "hồ sơ nào có bố mẹ làm nông nghiệp". Khác với
      find_profile_and_answer (cần biết `key` của 1 hồ sơ cụ thể
      trước), tool này tìm trực tiếp trong nội dung mà không cần biết
      trước hồ sơ nào. Mỗi kết quả trả về kèm archive_id để biết đoạn
      đó thuộc hồ sơ nào — muốn xem chi tiết hồ sơ đó thì gọi tiếp
      get_profile_detail.
    inputSchema:
      type: object
      properties:
        question:
          type: string
          description: "Câu hỏi/chủ đề cần tìm trong nội dung tất cả hồ sơ."
        top_k:
          type: integer
          description: "Số đoạn text tối đa trả về. Mặc định và tối đa là 5."
      required: ["question"]

  # ────────────────────────────────────────────────────────────────
  # TOOL: Search Archives — GET /api/public/archive (live, filter
  # chính xác theo field thật; tự fallback sang semantic search trên
  # dữ liệu đã index nếu không khớp chính xác). Đây là tool DUY NHẤT
  # để TÌM hồ sơ — không còn tool search_profile riêng nữa.
  # ────────────────────────────────────────────────────────────────
  - category: mcp
    name_tool: search_archives
    description: >
      Tìm kiếm hồ sơ lưu trữ theo từ khóa/bộ lọc CHÍNH XÁC (status, kho,
      ngôn ngữ, mã thời hạn bảo quản, khoảng ngày tạo/sửa). Đây là tool
      DUY NHẤT để tìm hồ sơ — tool tự thử khớp chính xác trước, chỉ khi
      không có kết quả nào mới tự mở rộng sang tìm kiếm theo nghĩa
      (semantic) trên dữ liệu đã đánh index. Không cần gọi tool nào
      khác để "tìm theo nghĩa" — cứ gọi tool này. Response có field
      "search_mode": "keyword" hoặc "semantic_fallback" để biết kết quả
      đến từ nguồn nào. Mặc định (include_details=false) response được
      RÚT GỌN: bỏ các field ít dùng (shelfCode, shelfLevelCode,
      warehouseName, startDate, endDate, roomNumber, totalDoc, language,
      maintenance) và bỏ nội dung markdown của document. Chỉ set
      include_details=true khi người dùng hỏi cụ thể tới nội dung file /
      vị trí lưu kho / thời hạn bảo quản của 1 hồ sơ đã xác định được.
    inputSchema:
      type: object
      properties:
        keywords:
          type: array
          items:
            type: string
          description: >
            1 hoặc nhiều biến thể từ khóa cần tìm trong tiêu đề, mã hồ
            sơ (arcFileCode), hoặc mã hộp (boxCode) — VD tên có dấu +
            không dấu + viết tắt của cùng 1 người. Truyền TẤT CẢ biến
            thể nghi ngờ vào 1 mảng trong 1 lần gọi tool này (tool tự
            gộp kết quả), KHÔNG tự gọi lại tool nhiều lần cho từng
            biến thể riêng lẻ.
        status:
          type: string
          description: "Lọc theo trạng thái hồ sơ."
        warehouse_id:
          type: string
          description: "Lọc theo ID kho lưu trữ."
        language:
          type: string
          description: "Lọc theo ngôn ngữ hồ sơ (VD: vi, en)."
        maintenance:
          type: string
          description: "Mã thời hạn bảo quản (VD: '10 năm', '5 năm', 'Vĩnh viễn')."
        created_from:
          type: string
          description: >
            Lọc hồ sơ được tạo TỪ ngày này. BẮT BUỘC định dạng đầy đủ
            YYYY-MM-DD (VD 2024-01-01) — TUYỆT ĐỐI không gửi chỉ năm
            (VD "2022") hay chỉ năm-tháng, API sẽ lỗi. Nếu người dùng
            chỉ nói năm (VD "từ năm 2022"), tự quy đổi thành ngày đầu
            năm: "2022-01-01".
        created_to:
          type: string
          description: >
            Lọc hồ sơ được tạo ĐẾN ngày này. BẮT BUỘC định dạng đầy đủ
            YYYY-MM-DD. Nếu người dùng chỉ nói năm (VD "đến năm 2022"),
            tự quy đổi thành ngày cuối năm: "2022-12-31".
        updated_from:
          type: string
          description: >
            Lọc hồ sơ được cập nhật TỪ ngày này. BẮT BUỘC định dạng đầy
            đủ YYYY-MM-DD, cùng quy tắc quy đổi năm-trần như created_from.
        updated_to:
          type: string
          description: >
            Lọc hồ sơ được cập nhật ĐẾN ngày này. BẮT BUỘC định dạng đầy
            đủ YYYY-MM-DD, cùng quy tắc quy đổi năm-trần như created_to.
        page:
          type: integer
          description: "Số trang, bắt đầu từ 0. Mặc định 0. Chỉ tăng lên khi trang trước không có kết quả phù hợp và vẫn còn trang tiếp theo."
        size:
          type: integer
          description: "Số hồ sơ mỗi trang. Mặc định 20."
        include_details:
          type: boolean
          description: >
            Mặc định false: response rút gọn, bỏ field ít dùng (shelfCode,
            shelfLevelCode, warehouseName, startDate, endDate, roomNumber,
            totalDoc, language, maintenance) và bỏ nội dung markdown của
            document. Chỉ set true khi người dùng hỏi cụ thể tới nội dung
            file / vị trí lưu kho vật lý / thời hạn bảo quản.
      required: []