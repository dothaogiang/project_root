version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Folder mcp/ — chỉ phục vụ request qua MCP protocol
  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - qdrant
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    command: python mcp/src/server.py

  # Folder rag/ — chạy độc lập, đồng bộ dữ liệu vào Qdrant MỘT LẦN DUY
  # NHẤT rồi thoát (không lặp lại theo giờ nữa). Chạy bằng:
  #   docker compose run --rm sync_job
  # (không nên "docker compose up" service này như một service thường
  # trực, vì nó không phải long-running process)
  sync_job:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - qdrant
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
    command: python -m rag.jobs.sync_job

volumes:
  qdrant_data:  