version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # Folder mcp/ — chỉ phục vụ request qua MCP protocol
  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - qdrant
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      SYNC_DB_PATH: /app/data/sync_state.db
    volumes:
      - ./data:/app/data
    command: python mcp/src/server.py

  # Folder rag/ — chạy độc lập, chỉ lo đồng bộ dữ liệu vào Qdrant,
  # không liên quan gì tới MCP protocol
  sync_cron:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - qdrant
    env_file: .env
    environment:
      QDRANT_URL: http://qdrant:6333
      SYNC_DB_PATH: /app/data/sync_state.db
    volumes:
      - ./data:/app/data
    entrypoint: >
      sh -c "while true; do python -m rag.jobs.sync_job; echo 'Chờ 3600s...'; sleep 3600; done"

volumes:
  qdrant_data:
